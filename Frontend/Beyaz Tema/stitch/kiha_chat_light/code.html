<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Kiha - Chat</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00E676",
                        "background-light": "#FFFFFF",
                        "surface-light": "#F2F2F7",
                        "text-main": "#1C1C1E",
                        "text-secondary": "#8E8E93",
                        "border-light": "#E5E5EA"
                    },
                    fontFamily: {
                        "display": ["Inter", "-apple-system", "BlinkMacSystemFont", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "1.25rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: #FFFFFF;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(0, 0, 0, 0.1);
        }
        .glass-input {
            background: rgba(118, 118, 128, 0.12);
            border: none;
        }
        .ios-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light text-text-main font-display min-h-screen flex flex-col pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]">
<!-- Top Bar -->
<header class="flex items-center justify-between px-6 py-4 bg-white/80 backdrop-blur-xl sticky top-0 z-50 border-b border-border-light/50">
<div class="flex items-center gap-2">
<h1 class="text-xl font-bold tracking-tight text-text-main">Kiha</h1>
<div class="w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_8px_rgba(0,230,118,0.4)]"></div>
</div>
<div class="flex items-center gap-3">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-surface-light text-text-secondary">
<span class="material-symbols-outlined text-[20px]">eyeglasses</span>
</div>
<div class="flex items-center gap-1.5 bg-surface-light px-3 py-1.5 rounded-full">
<span class="text-sm font-semibold text-text-main">78%</span>
<span class="material-symbols-outlined text-[16px] text-primary" style="font-variation-settings: 'FILL' 1;">battery_5_bar</span>
</div>
</div>
</header>
<!-- Main Chat Area (Empty State) -->
<main class="flex-1 flex flex-col items-center justify-center p-6 gap-10 overflow-y-auto no-scrollbar">
<!-- Welcome Section -->
<div class="flex flex-col items-center gap-6 w-full max-w-md mt-4">
<div class="w-24 h-24 rounded-[2rem] bg-white flex items-center justify-center border border-border-light ios-shadow">
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<div class="text-center space-y-2">
<h2 class="text-2xl font-bold text-text-main tracking-tight">Merhaba!</h2>
<p class="text-text-secondary text-sm font-medium max-w-[280px] leading-relaxed mx-auto">
                Kayıtlarınız hakkında bana her şeyi sorabilirsiniz.
            </p>
</div>
</div>
<!-- Suggestion Chips -->
<div class="flex flex-wrap justify-center gap-3 w-full max-w-md pb-4">
<button class="flex items-center gap-2 px-5 py-3 rounded-2xl bg-surface-light hover:bg-zinc-200 transition-colors text-[14px] font-semibold text-text-main ios-shadow">
<span>🔑</span> Anahtarlarımı nereye koydum?
        </button>
<button class="flex items-center gap-2 px-5 py-3 rounded-2xl bg-surface-light hover:bg-zinc-200 transition-colors text-[14px] font-semibold text-text-main ios-shadow">
<span>🍳</span> Ocağın altını kapattım mı?
        </button>
<button class="flex items-center gap-2 px-5 py-3 rounded-2xl bg-surface-light hover:bg-zinc-200 transition-colors text-[14px] font-semibold text-text-main ios-shadow">
<span>📱</span> Telefonumu nerede gördüm?
        </button>
<button class="flex items-center gap-2 px-5 py-3 rounded-2xl bg-surface-light hover:bg-zinc-200 transition-colors text-[14px] font-semibold text-text-main ios-shadow">
<span>🚗</span> Arabamı nereye park ettim?
        </button>
</div>
<!-- Spacer -->
<div class="h-12"></div>
</main>
<!-- Bottom Input & Nav Area -->
<div class="mt-auto flex flex-col">
<!-- Input Area -->
<div class="px-4 py-4 bg-gradient-to-t from-white via-white/95 to-transparent">
<div class="glass-input flex items-center rounded-2xl p-1.5 gap-2 max-w-md mx-auto">
<button class="flex items-center justify-center w-10 h-10 rounded-full text-text-secondary hover:text-primary transition-colors shrink-0">
<span class="material-symbols-outlined text-[24px]">mic</span>
</button>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-text-main placeholder:text-text-secondary/60 text-[16px] px-2 h-10" placeholder="Bir şey sorun..." type="text"/>
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-primary text-white shrink-0 shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-[22px] font-bold">arrow_upward</span>
</button>
</div>
</div>
<!-- Bottom Nav Bar -->
<nav class="glass-panel px-6 py-2 pb-[calc(0.5rem+env(safe-area-inset-bottom))] flex justify-center gap-16">
<a class="flex flex-col items-center justify-center gap-1 min-w-[64px] py-1 text-primary" href="#">
<span class="material-symbols-outlined text-[26px]" style="font-variation-settings: 'FILL' 1;">chat</span>
<span class="text-[11px] font-bold tracking-tight">Chat</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 min-w-[64px] py-1 text-text-secondary hover:text-text-main transition-colors" href="#">
<span class="material-symbols-outlined text-[26px]">settings</span>
<span class="text-[11px] font-bold tracking-tight">Ayarlar</span>
</a>
</nav>
</div>
</body></html>
