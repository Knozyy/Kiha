name: Kiha CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e "./server[dev]"

      - name: Ruff lint
        run: ruff check server/src/

      - name: Ruff format check
        run: ruff format --check server/src/

      - name: MyPy type check
        run: mypy server/src/ --python-version 3.12 --strict

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kiha_test
          POSTGRES_USER: kiha_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kiha_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e "./server[dev]"

      - name: Run tests
        env:
          KIHA_DB_HOST: localhost
          KIHA_DB_NAME: kiha_test
          KIHA_DB_USER: kiha_test
          KIHA_DB_PASSWORD: test_password
          KIHA_REDIS_HOST: localhost
          KIHA_JWT_SECRET: test_secret_key
        run: pytest server/tests/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f server/Dockerfile -t kiha-server:test .

      - name: Verify health endpoint
        run: |
          docker run -d --name kiha-test -p 8000:8000 kiha-server:test
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop kiha-test
